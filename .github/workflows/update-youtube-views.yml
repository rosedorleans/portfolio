name: Update YouTube views

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-youtube-views:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/update-youtube-views.mjs

      - name: Commit updated views
        run: |
          if git diff --quiet data/youtube-views.json; then
            echo "No YouTube view changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-views.json
          git commit -m "Update YouTube view counts"
          git push
